name: Build Spectra APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 7.4.2
        run: |
          wget -q https://services.gradle.org/distributions/gradle-7.4.2-bin.zip
          unzip -q gradle-7.4.2-bin.zip
          echo "$PWD/gradle-7.4.2/bin" >> $GITHUB_PATH

      - name: Generate all project files
        run: python3 create_files.py

      - name: Build APK
        run: gradle assembleDebug --no-daemon
        working-directory: ${{ github.workspace }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Spectra-debug
          path: app/build/outputs/apk/debug/app-debug.apk
